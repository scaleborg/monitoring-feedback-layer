name: P6 Monitoring Scheduled

on:
  schedule:
    # every hour at minute 17 to avoid top-of-hour congestion
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  monitoring:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run validation checks (P2 fixture)
        run: |
          uv run monitoring run-checks \
            --metadata-path tests/fixtures/dataset_metadata.json

      - name: Compute freshness (P2 fixture)
        run: |
          uv run monitoring compute-freshness \
            --metadata-path tests/fixtures/dataset_metadata.json

      - name: Emit dataset lineage (P2 fixture)
        run: |
          uv run monitoring emit-lineage-dataset-build \
            --metadata-path tests/fixtures/dataset_metadata.json

      - name: Emit training lineage (P4 expected-format fixture)
        run: |
          uv run monitoring emit-lineage-training-run \
            --metadata-path tests/fixtures/training_metadata.json
